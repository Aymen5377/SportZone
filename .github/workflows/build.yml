name: Recovery Build V2
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & Java
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # تثبيت المكتبات المفقودة التي تسبب فشل الـ Bundle
          npm install ajv ajv-keywords --save-dev

      - name: Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Build APK
        run: |
          cd android
          # هذا السطر يحل مشكلة الـ Bundle عبر زيادة الذاكرة المتاحة لـ Node
          export NODE_OPTIONS="--max-old-space-size=4096"
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          NODE_ENV: production

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Final
          path: android/app/build/outputs/apk/release/*.apk
          
