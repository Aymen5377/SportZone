name: Recovery Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & Java
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install & Fix Dependencies
        run: |
          npm install --legacy-peer-deps
          # تثبيت المكتبات التي تسببت في الخطأ الأخير يدوياً لضمان وجودها
          npx expo install expo-web-browser expo-linking expo-constants

      - name: Force Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Final
          path: android/app/build/outputs/apk/release/*.apk
          
