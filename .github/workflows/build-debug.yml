name: Ultimate Auto-Fix & Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🛠️ Fixed Environment & Dependencies
        env:
          EXPO_TOKEN: "V8zgDeYnZ6nUPq2C14BzBTNZCesKRBVQBYit0HML"
        run: |
          # 1. تثبيت إجباري للمكتبة التي تسببت في الخطأ
          npm install expo-router @expo/config-plugins --legacy-peer-deps

          # 2. إنشاء ملف app.json نظيف جداً يتجاوز خطأ Plugins
          echo '{
            "expo": {
              "name": "SportZone",
              "slug": "SportZone",
              "version": "1.0.0",
              "scheme": "sportzone",
              "extra": {
                "eas": {
                  "projectId": "7c5e2a22-3837-4d08-8f81-5431616c6899"
                }
              },
              "android": {
                "package": "com.aymen8557.sportzone"
              }
            }
          }' > app.json

          # 3. إنشاء ملف eas.json للـ APK
          echo '{"build": {"preview": {"android": {"buildType": "apk"}}}}' > eas.json

      - name: 📦 Install All Dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 Force EAS Build
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: "V8zgDeYnZ6nUPq2C14BzBTNZCesKRBVQBYit0HML"
          
