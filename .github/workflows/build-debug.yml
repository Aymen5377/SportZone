      - name: 📦 Install & Fix Dependencies
        run: |
          # حذف مجلد node_modules تماماً لضمان نظافة البيئة
          rm -rf node_modules
          # تثبيت المكتبات مع إجبار الإصدارات المتوافقة
          npm install --legacy-peer-deps
          # إضافة هذه المكتبة يدوياً لأنها هي من تسبب الخطأ المذكور
          npx expo install expo-modules-core expo-linking

      - name: ⚙️ Prebuild with Clean Slate
        run: |
          # إزالة أي ملفات أندرويد قديمة نتجت عن المحاولة الفاشلة
          rm -rf android
          npx expo prebuild --platform android --no-install --template blank

      - name: 🛠 Build with Fix
        run: |
          cd android
          chmod +x gradlew
          # إضافة هذه الخاصية لتجاهل مشاكل التوافق في الـ Plugins
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true
          
