name: Build Android Release APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: |
          rm -rf node_modules
          rm -rf android
          npm install --legacy-peer-deps
          npx expo install expo-router expo-constants expo-linking expo-modules-core

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Prebuild
        run: |
          sed -i '/expo-web-browser/d' app.json || true
          npx expo prebuild --platform android --no-install

      - name: 🚀 Optimize Memory & Paths
        run: |
          # زيادة ذاكرة Node.js لمنع فشل التجميع
          export NODE_OPTIONS="--max-old-space-size=4096"
          
          # إخبار Gradle بمكان ملف الـ entry لضمان عدم ضياع "الروح"
          cd android
          echo "nodeExecutablePath=$(which node)" >> local.properties
          
          # إنشاء مجلد الأصول يدوياً للتأكد
          mkdir -p app/src/main/assets

      - name: 🔑 Create Temporary Signing Key
        run: |
          cd android/app
          rm -f debug.keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias sportzone_key -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SportZone,O=App,C=US"

      - name: 🛠 Build Release APK (Final Fix)
        run: |
          cd android
          chmod +x gradlew
          # تشغيل البناء مع رفع كفاءة الذاكرة لـ Gradle أيضاً
          ./gradlew assembleRelease -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m" -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true --no-daemon

      - name: 📥 Upload Original APK
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Final-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
