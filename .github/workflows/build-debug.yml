name: Build Android Debug APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install & Fix Dependencies
        run: |
          rm -rf node_modules
          rm -rf android
          npm install --legacy-peer-deps
          npx expo install expo-modules-core expo-linking expo-constants

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Prebuild (Generate Android Folder)
        run: |
          # حذف أي إشارة للمكتبة المسببة للمشاكل من app.json
          sed -i '/expo-web-browser/d' app.json || true
          # استخدام الأمر الافتراضي بدون تحديد template خارجي لتجنب AssertionError
          npx expo prebuild --platform android --no-install

      - name: 🛠 Build with Fix
        run: |
          # التأكد من دخول المجلد بنجاح
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true --no-daemon

      - name: 📥 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Debug-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
