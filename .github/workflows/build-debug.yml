name: Build Android Release (Ultra Validation)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🔍 [STAGE 1] Comprehensive Project Check
        run: |
          echo "Starting Comprehensive Validation..."
          
          # 1. فحص الملفات الأساسية
          FILES=("package.json" "app.json")
          for file in "${FILES[@]}"; do
            if [ ! -f "$file" ]; then echo "❌ CRITICAL: $file missing!"; exit 1; fi
          done

          # 2. فحص مجلد app (مهم لـ Expo Router)
          if [ ! -d "app" ]; then echo "❌ CRITICAL: 'app' directory not found! Expo Router needs it."; exit 1; fi

          # 3. التأكد من ملف الدخول وصناعته إذا غاب
          if [ ! -f "index.js" ] && [ ! -f "App.js" ]; then
            echo "import 'expo-router/entry';" > index.js
            echo "✅ index.js created."
          fi
          
          echo "✅ Stage 1 passed."

      - name: 📦 [STAGE 2] Dependency & Environment Setup
        run: |
          # مسح شامل للمخلفات
          rm -rf node_modules android
          
          # تثبيت مع تحديد الذاكرة يدوياً في الأمر نفسه
          NODE_OPTIONS="--max-old-space-size=4096" npm install --legacy-peer-deps
          npx expo install expo-router expo-constants expo-linking expo-modules-core
          
          echo "✅ Stage 2 passed."

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ [STAGE 3] Prebuild & Native Prep
        run: |
          # تنظيف ملف الإعدادات
          sed -i '/expo-web-browser/d' app.json || true
          
          # توليد مجلد الأندرويد
          npx expo prebuild --platform android --no-install
          
          # إعداد مسارات الأندرويد والذاكرة يدوياً
          cd android
          echo "nodeExecutablePath=$(which node)" >> local.properties
          mkdir -p app/src/main/assets
          
          # إنشاء مفتاح التوقيع في مكانه الصحيح
          cd app
          rm -f debug.keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias sportzone_key -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SportZone,O=App,C=US"
          
          echo "✅ Stage 3 passed."

      - name: 🛠 [STAGE 4] Final Heavy Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # تنفيذ البناء مع حقن الذاكرة مباشرة في محرك Gradle و Node
          NODE_OPTIONS="--max-old-space-size=4096" ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            --no-daemon

      - name: 📥 Upload Original APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Ultimate-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
