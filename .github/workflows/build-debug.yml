name: SportZone SSH via Ngrok
on: [push, workflow_dispatch]

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set SSH Password
        run: |
          # تعيين كلمة سر بسيطة للدخول
          echo "runner:1234" | sudo chpasswd

      - name: Install Ngrok & Setup
        run: |
          # تحميل وتثبيت Ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok
          
          # استخدام التوكن الخاص بك مباشرة
          ngrok config add-authtoken 3CpyQAkpEDXaGdmRT1v9Rha4QYz_4LunC9PrBX7ZsxmmbxKgL

      - name: Start SSH Tunnel
        run: |
          # تشغيل النفق على بورت SSH (22)
          ngrok tcp 22 &
          sleep 10
          # استخراج رابط الاتصال وإظهاره في الـ Logs
          curl --silent http://127.0.0.1:4040/api/tunnels | jq '.tunnels[0].public_url'

      - name: Keep Alive
        run: |
          echo "السيرفر جاهز! انتظر ظهور الرابط في الأعلى واتصل من Termux."
          # سيظل السيرفر مفتوحاً لمدة 6 ساعات أو حتى تغلقه يدوياً
          sleep 21600
          
