name: List Cached Files & Tasks
on: [push]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Checkout
        uses: actions/checkout@v4

      # 1. استرجاع الكاش المتاح لرؤية ما بداخله
      - name: 📂 Restore Cache for Inspection
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            android/app/build
          key: ${{ runner.os }}-universal-cache- # استخدم نفس اسم الكاش السابق

      # 2. فحص الملفات المحفوظة وطباعة أسمائها
      - name: 🔍 Audit Files & Remaining Tasks
        run: |
          echo "=========================================="
          echo "📂 قائمة المجلدات المحفوظة في الكاش حالياً:"
          echo "=========================================="
          if [ -d "android/app/build" ]; then
            find android/app/build -maxdepth 2
          else
            echo "❌ مجلد Build غير موجود في الكاش!"
          fi

          echo -e "\n=========================================="
          echo "📑 المهام (Tasks) التي اكتملت وتم حفظها:"
          echo "=========================================="
          # فحص ملفات التقدم في Gradle
          if [ -d "android/.gradle" ]; then
            ls -R android/.gradle | grep "task" || echo "لا توجد مهام مسجلة بعد."
          fi

          echo -e "\n=========================================="
          echo "🛠️ ما هي الملفات التي تحتاجها لـ Termux؟"
          echo "=========================================="
          echo "1. ملفات Java المترجمة: find android/app/build/intermediates/javac/release -name '*.class'"
          echo "2. الموارد المدمجة: ls android/app/build/intermediates/res/merged/release"
          
          echo -e "\n⚠️ تنبيه لـ Termux:"
          echo "لتكملة العمل في ترمكس، ستحتاج لتحميل مجلد android/app/build بالكامل."
