name: Build Android Release APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: |
          rm -rf node_modules
          rm -rf android
          npm install --legacy-peer-deps
          npx expo install expo-router expo-constants expo-linking expo-modules-core

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Prebuild (Preparing Native Android)
        run: |
          sed -i '/expo-web-browser/d' app.json || true
          npx expo prebuild --platform android --no-install

      - name: 🔑 Create Temporary Signing Key
        run: |
          cd android/app
          # حذف أي مفتاح قديم إذا وجد لتجنب خطأ Alias already exists
          rm -f debug.keystore
          # إنشاء مفتاح جديد باسم فريد
          keytool -genkey -v -keystore debug.keystore -storepass android -alias sportzone_key -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SportZone,O=App,C=US"

      - name: 🛠 Build Release APK (The Original Version)
        run: |
          cd android
          chmod +x gradlew
          # بناء نسخة الـ Release
          ./gradlew assembleRelease -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true --no-daemon

      - name: 📥 Upload Original APK
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Original-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
