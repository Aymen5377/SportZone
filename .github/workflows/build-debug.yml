name: Full Automated EAS Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🛠️ Create Base Config Files
        # سننشئ ملفات أساسية بدون projectId لنترك لـ EAS مهمة توليده
        run: |
          echo '{
            "expo": {
              "name": "SportZone",
              "slug": "SportZone",
              "version": "1.0.0",
              "android": {
                "package": "com.aymen8557.sportzone"
              }
            }
          }' > app.json

          echo '{
            "build": {
              "preview": {
                "android": {
                  "buildType": "apk"
                }
              }
            }
          }' > eas.json

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 Start EAS Build (Auto-Link)
        # هذا الأمر سيقوم بربط المشروع وبدء البناء في خطوة واحدة
        run: eas build --platform android --profile preview --non-interactive --auto-dependency-resolution
        env:
          EXPO_TOKEN: "V8zgDeYnZ6nUPq2C14BzBTNZCesKRBVQBYit0HML"
          
