name: Debug & Complete Remaining Tasks
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      # 1. استرجاع المكتبات (Dependencies) من الكاش
      - name: 📦 Restore Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      # 2. استرجاع مجلد أندرويد وملفات Gradle (الـ 197 جزء المكتملة)
      - name: ⚡ Restore Gradle & Android Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            android/app/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 3. محاولة إنهاء الـ 54 جزء المتبقية مع طبع الخطأ بالتفصيل
      - name: 🛠️ Build Remaining Tasks & Debug
        working-directory: android
        run: |
          chmod +x gradlew
          # أضفنا --stacktrace و --info لإظهار سبب المشكلة الحقيقي
          ./gradlew assembleRelease --build-cache \
          --stacktrace --info \
          -Dorg.gradle.jvmargs="-Xmx3072m" \
          -Dorg.gradle.daemon=false \
          -x lint
          
