name: Build Android Debug APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install & Fix Dependencies
        run: |
          rm -rf node_modules
          rm -rf android
          npm install --legacy-peer-deps
          npx expo install expo-modules-core expo-linking expo-constants

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Prebuild (Generate Android Folder)
        run: |
          sed -i '/expo-web-browser/d' app.json || true
          npx expo prebuild --platform android --no-install

      - name: 👻 Inject Soul & Create Config
        run: |
          # إنشاء مجلدات الأصول
          mkdir -p android/app/src/main/assets
          
          # إنشاء ملف metro.config.js مؤقت لإرضاء النظام
          echo "const { getDefaultConfig } = require('@expo/metro-config');
          module.exports = getDefaultConfig(__dirname);" > metro.config.js
          
          # تحديد ملف المدخل (index.js أو App.js)
          ENTRY_FILE=$(node -e "const fs = require('fs'); console.log(fs.existsSync('index.js') ? 'index.js' : 'App.js')")
          echo "Using entry file: $ENTRY_FILE"

          # توليد الـ Bundle يدوياً مع الإعدادات الجديدة
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file "$ENTRY_FILE" \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --config metro.config.js

      - name: 🛠 Build with Fix
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true --no-daemon

      - name: 📥 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Stable-Bundle
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
