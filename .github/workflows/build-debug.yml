name: Complete Remaining 54 Tasks
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Checkout Project
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 1️⃣ استرجاع "الخزنة" التي تحتوي على الـ 197 جزء المكتملة
      - name: 📂 Universal Cache Restore
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            android
            ~/.gradle/caches
            ~/.gradle/wrapper
          # نستخدم نفس المفتاح لضمان العودة لنفس نقطة الحفظ
          key: ${{ runner.os }}-universal-cache-${{ hashFiles('**/package-lock.json', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-universal-cache-

      # 2️⃣ التأكد من سلامة البيئة دون تحميل خارجي
      - name: 🛠️ Environment Ready Check
        run: |
          if [ ! -d "node_modules/expo" ]; then
            npm install expo --no-save
          fi
          if [ ! -d "android" ]; then
            npx expo prebuild --platform android --no-install
          fi

      # 3️⃣ استكمال الـ 54 مهمة المتبقية مع طباعة الخطأ فوراً
      - name: 🏗️ Finish Remaining Tasks
        working-directory: android
        run: |
          chmod +x gradlew
          
          echo "⏳ يستكمل الآن من حيث توقف (المهام المتبقية)..."
          
          # استخدام --build-cache لإخبار Gradle باستخدام الـ 197 جزءاً المحفوظة
          ./gradlew assembleRelease --build-cache \
          --continue \
          -Dorg.gradle.jvmargs="-Xmx3072m" \
          -Dorg.gradle.daemon=false \
          || { 
               echo "❌❌ توقف البناء! إليك سبب المشكلة في الأجزاء المتبقية: ❌❌";
               ./gradlew assembleRelease --info | grep -E "error|FAILED" -A 3; 
               exit 1; 
             }

      # 4️⃣ استخراج الـ APK فور النجاح
      - name: 📤 Upload SportZone APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Final-Build
          path: android/app/build/outputs/apk/release/*.apk
          
