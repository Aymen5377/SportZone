name: Build Android Debug APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install & Fix Dependencies
        run: |
          rm -rf node_modules
          rm -rf android
          npm install --legacy-peer-deps
          # تثبيت المكتبات اللازمة لـ Expo Router ليعمل بشكل مستقل
          npx expo install expo-router expo-constants expo-linking expo-modules-core

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Prebuild (Generate Android Folder)
        run: |
          # تنظيف app.json من أي plugins معطلة
          sed -i '/expo-web-browser/d' app.json || true
          # توليد مجلد الأندرويد
          npx expo prebuild --platform android --no-install

      - name: 🛠 Build APK with Embedded Soul
        run: |
          cd android
          chmod +x gradlew
          # السر هنا: تشغيل المهام التي تدمج الكود (Bundle) وتجمع الـ APK في خطوة واحدة
          # ستقوم هذه الخطوة بإنشاء الـ Bundle تلقائياً بدون البحث عن App.js يدوياً
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true --no-daemon
          
