name: Build Android Debug APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install & Fix Dependencies
        run: |
          # تنظيف البيئة لضمان عدم وجود ملفات معطوبة
          rm -rf node_modules
          rm -rf android
          # تثبيت المكتبات مع تجاهل التعارضات
          npm install --legacy-peer-deps
          # تثبيت مكتبات الجسر الأساسية يدوياً
          npx expo install expo-modules-core expo-linking expo-constants

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Prebuild (Generate Android Folder)
        run: |
          # حذف أي إضافات قد تعطل البناء برمجياً
          sed -i '/expo-web-browser/d' app.json || true
          # توليد مجلد الأندرويد الخام
          npx expo prebuild --platform android --no-install

      - name: 👻 Inject Soul (Expo Offline Bundle)
        run: |
          # إنشاء مجلد الأصول (Assets) داخل هيكل الأندرويد
          mkdir -p android/app/src/main/assets
          # توليد ملف الـ Bundle (الروح) وحقنه داخل التطبيق ليعمل بدون سيرفر
          npx expo export:embed --platform android --dev false --dest android/app/src/main/assets

      - name: 🛠 Build with Fix
        run: |
          cd android
          # إعطاء صلاحية التنفيذ لمحرك البناء
          chmod +x gradlew
          # البدء في تجميع ملف الـ APK مع تفعيل أدوات التوافق
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true --no-daemon

      - name: 📥 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-With-Soul-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
