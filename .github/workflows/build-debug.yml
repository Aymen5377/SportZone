name: SportZone SSH via Cloudflare
on: [push, workflow_dispatch]

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure SSH & Password
        run: |
          # تعيين كلمة المرور للمستخدم runner
          echo "runner:1234" | sudo chpasswd
          # تفعيل خدمة الـ SSH والسماح بالدخول بكلمة مرور
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/g' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/g' /etc/ssh/sshd_config
          sudo service ssh restart

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Cloudflare Tunnel
        run: |
          # تشغيل النفق وربطه بـ SSH المحلي
          cloudflared tunnel --url ssh://localhost:22 > cloudflare.log 2>&1 &
          sleep 15
          echo "------------------------------------------------"
          grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cloudflare.log | head -n 1
          echo "------------------------------------------------"

      - name: Keep Alive
        run: |
          echo "السيرفر جاهز الآن! إذا لم يستجب SSH، تأكد من تحديث الرابط."
          sleep 21600
          
