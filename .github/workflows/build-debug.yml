name: Final Fix & Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Checkout Project
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 1️⃣ استرجاع الكاش (للحصول على ما تم بناؤه سابقاً)
      - name: 📂 Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            android/.gradle
            android/app/build
            ~/.gradle/caches
          key: ${{ runner.os }}-final-build-cache

      # 2️⃣ إصلاح المكتبات التالفة (أهم خطوة)
      # سنقوم بحذف المجلدات التي سببت الخطأ وإعادة تحميلها نظيفة
      - name: 🛠️ Repair Dependencies
        run: |
          rm -rf node_modules
          npm install --legacy-peer-deps
          # التأكد من وجود أدوات Expo الأساسية
          npx expo install --fix

      # 3️⃣ إعادة توليد ملفات أندرويد لتتوافق مع المكتبات الجديدة
      - name: 📂 Refresh Android Structure
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      # 4️⃣ البناء النهائي (الـ 54 جزء المتبقية)
      - name: 🏗️ Build Remaining Tasks
        working-directory: android
        run: |
          chmod +x gradlew
          # استخدام Clean لتنظيف التضاربات السابقة في Gradle
          ./gradlew clean assembleRelease --build-cache \
          -Dorg.gradle.jvmargs="-Xmx3072m" \
          -Dorg.gradle.daemon=false \
          || { 
               echo "❌ فشل البناء! التقرير النهائي:";
               ./gradlew assembleRelease --stacktrace --info | grep "error:" -A 5;
               exit 1;
             }

      - name: 📤 Upload SportZone APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Final
          path: android/app/build/outputs/apk/release/*.apk
          
