name: SportZone SSH via Cloudflare
on: [push, workflow_dispatch]

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set SSH Password
        run: |
          echo "runner:1234" | sudo chpasswd

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Cloudflare Tunnel
        run: |
          # تشغيل النفق وإظهار رابط الاتصال
          cloudflared tunnel --url ssh://localhost:22 > cloudflare.log 2>&1 &
          sleep 10
          grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cloudflare.log | head -n 1

      - name: Keep Alive
        run: |
          echo "السيرفر جاهز! انسخ الرابط الذي ينتهي بـ .trycloudflare.com"
          sleep 21600
          
