name: Connect GitHub Action to Termux
on: workflow_dispatch # لتشغيله يدوياً متى شئت

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tmate Session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false # لسهولة الدخول من الهاتف
          
