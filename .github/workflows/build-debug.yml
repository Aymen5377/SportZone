name: Fix Expo Config & Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 1. استرجاع الكاش المتاح (مهما كان نوعه)
      - name: 📦 Restore Any Cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            android
            ~/.gradle/caches
          key: ${{ runner.os }}-build-cache

      # 2. تثبيت المكتبة المفقودة قسرياً (لحل ConfigError)
      - name: 🛠️ Install Expo Core Only
        run: |
          if [ ! -d "node_modules/expo" ]; then
            echo "Expo module missing, installing core..."
            npm install expo --no-save
          fi

      # 3. توليد المجلد المفقود (Prebuild)
      - name: 📂 Generate Android Folder
        run: |
          if [ ! -d "android" ]; then
            npx expo prebuild --platform android --no-install
          fi

      # 4. بناء الأجزاء المتبقية (الـ 54 خطوة)
      - name: 🏗️ Build Remaining Tasks
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --build-cache \
          --stacktrace \
          -Dorg.gradle.jvmargs="-Xmx3072m" \
          -x lint
          
