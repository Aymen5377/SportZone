name: Ultimate Auto-Fix & Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🛠️ Comprehensive Environment Fixer
        # هذا السكربت يفحص كل شيء: الملفات، الربط، والمعرفات ويصلحها فوراً
        env:
          EXPO_TOKEN: "V8zgDeYnZ6nUPq2C14BzBTNZCesKRBVQBYit0HML"
        run: |
          # 1. إنشاء ملف eas.json إذا كان مفقوداً
          echo '{"build": {"preview": {"android": {"buildType": "apk"}}}}' > eas.json
          
          # 2. إنشاء app.json أساسي إذا لم يوجد
          if [ ! -f app.json ]; then
            echo '{"expo": {"name": "SportZone", "slug": "SportZone", "android": {"package": "com.aymen8557.sportzone"}}}' > app.json
          fi

          # 3. الحل السحري: ربط المشروع برمجياً واستخراج الـ ID
          echo "🔍 جاري ربط المشروع بحساب Expo..."
          npx eas-cli project:init --non-interactive || true
          
          # 4. التأكد من وجود projectId في app.json
          if ! grep -q "projectId" app.json; then
            echo "⚠️ المعرف مفقود، جاري الربط القسري..."
            # هذا الأمر سيجبر Expo على توليد ID ووضعه في الملف
            npx eas-cli build --platform android --profile preview --non-interactive --dry-run
          fi

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 Final Build Execution
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: "V8zgDeYnZ6nUPq2C14BzBTNZCesKRBVQBYit0HML"
          
