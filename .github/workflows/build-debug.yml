name: Full Automated EAS Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🛠️ Auto-Generate Config Files
        # سنقوم بإنشاء app.json و eas.json معاً لضمان عدم سؤال السيرفر عن أي شيء
        run: |
          echo '{
            "expo": {
              "name": "SportZone",
              "slug": "SportZone",
              "version": "1.0.0",
              "orientation": "portrait",
              "icon": "./assets/icon.png",
              "userInterfaceStyle": "light",
              "assetBundlePatterns": ["**/*"],
              "ios": { "supportsTablet": true },
              "android": {
                "adaptiveIcon": {
                  "foregroundImage": "./assets/adaptive-icon.png",
                  "backgroundColor": "#ffffff"
                },
                "package": "com.aymen8557.sportzone"
              },
              "extra": {
                "eas": {
                  "projectId": "8b5f3a1e-7f6c-4b5a-9d2e-1c8f5a3b2d1e" 
                }
              }
            }
          }' > app.json

          echo '{
            "build": {
              "preview": {
                "android": {
                  "buildType": "apk"
                }
              }
            }
          }' > eas.json

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 Start EAS Build
        # الآن سيعمل هذا الأمر مباشرة لأن الملفات جاهزة
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: "V8zgDeYnZ6nUPq2C14BzBTNZCesKRBVQBYit0HML"
          
