name: Build Android Release (The Final Stand)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🛠️ [FORCE] Prepare Entry & Clean
        run: |
          rm -rf node_modules android
          if [ ! -f "index.js" ] && [ ! -f "App.js" ]; then
            echo "import 'expo-router/entry';" > index.js
          fi

      - name: 📦 [FORCE] Massive Dependency Install
        run: |
          npm install --legacy-peer-deps
          # تثبيت شامل لكل المكتبات التي ظهرت في أخطائك السابقة والمحتملة
          npx expo install @shopify/flash-list \
                           expo-router \
                           expo-haptics \
                           expo-constants \
                           expo-linking \
                           expo-modules-core \
                           react-native-safe-area-context \
                           react-native-screens \
                           react-native-reanimated \
                           react-native-gesture-handler \
                           expo-status-bar \
                           expo-font \
                           expo-localization \
                           @react-native-community/netinfo

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Native Prebuild
        run: |
          sed -i '/expo-web-browser/d' app.json || true
          npx expo prebuild --platform android --no-install
          cd android && echo "nodeExecutablePath=$(which node)" >> local.properties

      - name: 🛠 Build Release (With Debug Info)
        run: |
          cd android
          chmod +x gradlew
          # أضفنا --stacktrace و --info لمعرفة السبب الحقيقي لو سقط البناء
          NODE_OPTIONS="--max-old-space-size=4096" ./gradlew assembleRelease \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4096m" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            --no-daemon

      - name: 📥 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Ultimate-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
