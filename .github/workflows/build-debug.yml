name: Ultimate Auto-Fix & Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🛠️ Fix Plugins & Config
        run: |
          # 1. تثبيت الإضافات التي تسببت في تعليق النظام
          npm install expo-router @expo/config-plugins --legacy-peer-deps

          # 2. إنشاء ملف app.json "خام" (بدون projectId) ليقوم النظام بإنشائه
          echo '{
            "expo": {
              "name": "SportZone",
              "slug": "SportZone",
              "version": "1.0.0",
              "scheme": "sportzone",
              "android": {
                "package": "com.aymen8557.sportzone"
              }
            }
          }' > app.json

          # 3. إنشاء ملف eas.json للـ APK
          echo '{"build": {"preview": {"android": {"buildType": "apk"}}}}' > eas.json

      - name: 🔗 Link Project to Account
        # هذا الأمر هو الذي سيولد الـ ID الصحيح ويربطه بحسابك aymen8557
        env:
          EXPO_TOKEN: "V8zgDeYnZ6nUPq2C14BzBTNZCesKRBVQBYit0HML"
        run: npx eas-cli project:init --non-interactive

      - name: 📦 Install All Dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 Launch EAS Build
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: "V8zgDeYnZ6nUPq2C14BzBTNZCesKRBVQBYit0HML"
          
