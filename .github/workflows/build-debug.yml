name: Build Android Debug APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install & Fix Dependencies
        run: |
          # حذف المجلدات لضمان بيئة نظيفة 100%
          rm -rf node_modules
          rm -rf android
          
          # تثبيت المكتبات مع تجاهل تعارض النسخ
          npm install --legacy-peer-deps
          
          # تثبيت المكتبات التي تسبب مشاكل التوافق يدوياً
          npx expo install expo-modules-core expo-linking expo-constants

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Prebuild with Clean Slate
        run: |
          # تنظيف إضافي قبل التوليد
          rm -rf android
          # حذف أي إشارة لـ web-browser لتجنب خطأ الـ Plugin
          sed -i '/expo-web-browser/d' app.json || true
          # توليد المجلد باستخدام قالب نظيف
          npx expo prebuild --platform android --no-install --template blank

      - name: 🛠 Build with Fix
        run: |
          cd android
          chmod +x gradlew
          # تشغيل البناء مع تفعيل أدوات التوافق وتجاهل المشاكل التقنية الصغيرة
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true --no-daemon

      - name: 📥 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Final-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
