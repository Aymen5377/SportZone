name: Full Automated EAS Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🛠️ Create EAS Config File (Auto-Generate)
        # هذا الجزء سيقوم بإنشاء ملف eas.json تلقائياً قبل بدء البناء لضمان إنتاج APK
        run: |
          echo '{
            "build": {
              "preview": {
                "android": {
                  "buildType": "apk"
                }
              }
            }
          }' > eas.json

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 Start EAS Build (APK Production)
        # سيتم استخدام التوكن الخاص بك هنا مباشرة
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: "V8zgDeYnZ6nUPq2C14BzBTNZCesKRBVQBYit0HML"
          
