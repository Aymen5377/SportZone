name: Build Android Release (Final Force)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🛠️ [STEP 1] Force Create Entry File
        run: |
          # محاولة إنشاء الملف أولاً لضمان وجود "الروح"
          if [ ! -f "index.js" ] && [ ! -f "App.js" ]; then
            echo "import 'expo-router/entry';" > index.js
            echo "✅ index.js has been created."
          else
            echo "✅ Entry file already exists."
          fi

      - name: 🔍 [STEP 2] Immediate Validation
        run: |
          # الفحص بعد الإنشاء مباشرة
          echo "Verifying entry file before proceeding..."
          if [ -f "index.js" ] || [ -f "App.js" ]; then
            echo "🚀 Success: Soul found! Proceeding to build."
          else
            echo "❌ Critical Error: Could not create or find entry file!"
            exit 1
          fi

      - name: 📦 Install Dependencies
        run: |
          rm -rf node_modules android
          npm install --legacy-peer-deps
          npx expo install expo-router expo-constants expo-linking expo-modules-core

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Prebuild
        run: |
          sed -i '/expo-web-browser/d' app.json || true
          npx expo prebuild --platform android --no-install

      - name: 🚀 Prepare Environment
        run: |
          echo "NODE_OPTIONS=--max-old-space-size=4096" >> $GITHUB_ENV
          cd android
          echo "nodeExecutablePath=$(which node)" >> local.properties
          mkdir -p app/src/main/assets
          # إنشاء مفتاح التوقيع
          cd app
          rm -f debug.keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias sportzone_key -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SportZone,O=App,C=US"

      - name: 🛠 Final Build (Release APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            --no-daemon

      - name: 📥 Upload Original APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Final-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
