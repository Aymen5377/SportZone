name: Build Android Release (Final Ultimate Shield)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🛠️ [PHASE 1] Structural Integrity & Entry Point
        run: |
          echo "Starting Structural Check..."
          # تأمين ملف التشغيل (الروح)
          if [ ! -f "index.js" ] && [ ! -f "App.js" ]; then
            echo "import 'expo-router/entry';" > index.js
            echo "✅ Created missing index.js"
          fi
          # التأكد من وجود مجلد app لـ Expo Router
          if [ ! -d "app" ]; then
            echo "❌ ERROR: 'app' folder is missing! Build cannot proceed."
            exit 1
          fi

      - name: 📦 [PHASE 2] Exhaustive Dependency Injection
        run: |
          # تنظيف شامل
          rm -rf node_modules android
          
          # تثبيت المكتبات الأساسية
          npm install --legacy-peer-deps
          
          # تثبيت إجباري لكل المكتبات التي قد تسبب "شاشة حمراء" أو فشل تجميع
          echo "Injecting all required libraries..."
          npx expo install @shopify/flash-list \
                           expo-router \
                           expo-haptics \
                           expo-constants \
                           expo-linking \
                           expo-modules-core \
                           react-native-safe-area-context \
                           react-native-screens \
                           react-native-reanimated \
                           react-native-gesture-handler \
                           expo-status-bar \
                           expo-font

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ [PHASE 3] Native & Signing Guard
        run: |
          # معالجة ملف الإعدادات
          sed -i '/expo-web-browser/d' app.json || true
          
          # توليد مجلد الأندرويد
          npx expo prebuild --platform android --no-install
          
          # تثبيت مسار النود وذاكرة البناء
          cd android
          echo "nodeExecutablePath=$(which node)" >> local.properties
          mkdir -p app/src/main/assets
          
          # إنشاء مفتاح التوقيع في مسار نظيف
          cd app
          rm -f debug.keystore
          keytool -genkey -v -keystore debug.keystore -storepass android -alias sportzone_key -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SportZone,O=App,C=US"

      - name: 🛠 [PHASE 4] The Heavy Build (Release APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # تشغيل البناء النهائي مع أقصى طاقة ذاكرة ممكنة للسيرفر
          NODE_OPTIONS="--max-old-space-size=4096" ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            --no-daemon

      - name: 📥 Upload Original APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Stable-Original
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
