name: Finish Remaining Tasks Only
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      # 1. استرجاع المكتبات من الكاش (لن يحمل شيئاً من الإنترنت)
      - name: 📦 Restore Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      # 2. استرجاع مجلد أندرويد (الـ 197 جزء المكتملة)
      - name: 📂 Restore Android Folder & Gradle
        uses: actions/cache@v4
        id: android-cache
        with:
          path: |
            android
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-android-gradle-final

      # 3. التأكد من وجود المجلد (حل مشكلة No such file or directory)
      - name: 🛠️ Repair Android Structure
        run: |
          if [ ! -d "android" ]; then
            echo "⚠️ المجلد مفقود من الكاش، جاري إعادة توليده سريعاً..."
            npx expo prebuild --platform android --no-install
          else
            echo "✅ المجلد موجود، سنكمل من حيث توقفنا."
          fi

      # 4. تشغيل البناء للأجزاء المتبقية فقط وطباعة الخطأ
      - name: 🏗️ Build Remaining (54 Tasks)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --build-cache \
          --stacktrace --info \
          -Dorg.gradle.jvmargs="-Xmx3072m" \
          -x lint
          
