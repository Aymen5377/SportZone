name: Build Android Debug APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # إزالة المكتبة المسببة للمشاكل برمجياً لأننا لا نحتاجها للبث المباشر حالياً
          npm uninstall expo-web-browser 

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Force Generate Android Folder
        run: |
          # استخدام خيار --template لضمان وجود هيكل أندرويد سليم
          npx expo prebuild --platform android --no-install --template blank

      - name: 🛠 Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 📥 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
