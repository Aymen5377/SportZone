name: Robust Incremental Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. إعداد الجافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 2. ميزة الحفظ الذكي (The Magic Cache)
      # هذا الجزء يبحث عن آخر "نسخة محفوظة" من البناء ويحملها
      - name: Cache Gradle Wrapper & Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/app/build
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Node Modules
        run: npm install --legacy-peer-deps

      # 3. تشغيل البناء مع أمر "الاستمرار"
      - name: Build Android APK
        working-directory: android
        run: |
          # نستخدم --build-cache لتفعيل التخزين الداخلي لـ Gradle
          # ونستخدم خيارات الذاكرة التي اتفقنا عليها
          ./gradlew assembleRelease --build-cache \
          -Dorg.gradle.jvmargs="-Xmx3072m" \
          -Dorg.gradle.daemon=false

      # 4. رفع الملف النهائي إذا نجح
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SportZone-Final
          path: android/app/build/outputs/apk/release/app-release.apk
          
