workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: 18 # سنبقى على 18 لضمان التوافق
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
          # إضافة مكتبة ajv يدوياً لحل مشكلة التضارب التي ظهرت في الخطأ
          npm install ajv-keywords --save-dev

      - name: Build Android APK
        script: |
          # محاولة إنشاء مجلد أندرويد مع تجاهل أخطاء التوافق البسيطة
          npx expo prebuild --platform android --no-install
          
          # الدخول للمجلد والتأكد من وجوده
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "Error: Android folder was not created!"
            exit 1
          fi
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - abedaymen680@gmail.com
          
